<svg fill="none" viewBox="0 0 600 400" width="600" height="200" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <link href="https://fonts.googleapis.com/css?family=Russo+One" rel="stylesheet" />
      <style>
        .body {
          font-family: "Oswald", sans-serif;
          font-style: italic;
        }
        .container {
          position: absolute;
          transform: translate(-50%, -20%);
          top: 40%;
          left: 50%;
        }
        svg {
        	font-family: 'Russo One', sans-serif;
          width: 100%; height: 200px;
          }
        svg text {
          animation: stroke 5s infinite alternate;
          stroke-width: 2;
          text-align: center;
          stroke: #365fa0;
          font-size: 110px;
        }
        @keyframes stroke {
            0%   {
                fill: #E5FF95; stroke: #ADE61E;
                stroke-dashoffset: 25%; stroke-dasharray: 0 50%; stroke-width: 2;
            }
            70%  {fill: #E5FF95; stroke: #ADE61E; }
            80%  {fill: #E5FF95; stroke: #ADE61E; stroke-width: 3; }
            100% {
                fill: white; stroke: white; 
                stroke-dashoffset: -25%; stroke-dasharray: 50% 0; stroke-width: 0;
            }
        }
      </style>
    <div class='body'>
      <div class="container">
        <svg viewBox="-230 -80 1000 100"><text >Sinbad</text></svg>
      </div>
    </div>
    </div>
  </foreignObject>
</svg>
