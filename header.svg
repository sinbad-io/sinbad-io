<svg viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <link href="https://fonts.googleapis.com/css?family=Russo+One" rel="stylesheet" />
    <defs>
        <style type="text/css">
        svg {
          font-family: 'Russo One', sans-serif;
          position: absolute; 
          background: #e3f2fd;
          width: 100%; height: 100%;
        }
        svg text {
          text-transform: uppercase;
          animation: stroke 5s infinite alternate;
          stroke-width: 2;
          stroke: #000000;
          font-size: 140px;
        }
        @keyframes stroke {
          0%   {
            fill: rgba(72,138,20,0); stroke: rgba(54,95,160,1);
            stroke-dashoffset: 25%; stroke-dasharray: 0 50%; stroke-width: 2;
          }
          70%  {fill: rgba(72,138,20,0); stroke: rgba(54,95,160,1); }
          80%  {fill: rgba(72,138,20,0); stroke: rgba(54,95,160,1); stroke-width: 3; }
          100% {
            fill: rgba(72,138,204,1); stroke: rgba(54,95,160,0); 
            stroke-dashoffset: -25%; stroke-dasharray: 50% 0; stroke-width: 0;
          }
        }
        </style>
    </defs>

    <symbol id="s-text">
        <text text-anchor="middle" x="50%" y="80%">Sinbad-io</text>
    </symbol>

    <g class = "g-ants">
        <use xlink:href="#s-text" class="text-copy"></use>
        <use xlink:href="#s-text" class="text-copy"></use>
        <use xlink:href="#s-text" class="text-copy"></use>
        <use xlink:href="#s-text" class="text-copy"></use>
        <use xlink:href="#s-text" class="text-copy"></use>
    </g>
</svg>